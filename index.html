<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shorts Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141420;--surface2:#1c1c2e;--accent:#ff3366;--accent2:#ff6b9d;--accent-glow:rgba(255,51,102,0.3);--text:#e8e8f0;--text-dim:#8888aa;--border:#2a2a40;--success:#00e676;--radius:16px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}.bg-glow{position:fixed;top:-30%;left:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(255,51,102,0.08) 0%,transparent 70%);pointer-events:none;animation:drift 12s ease-in-out infinite alternate}.bg-glow.two{top:auto;bottom:-30%;left:auto;right:-20%;background:radial-gradient(circle,rgba(100,50,255,0.06) 0%,transparent 70%);animation-delay:-6s}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:60px 20px 40px}.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#cc2255);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px var(--accent-glow)}.logo h1{font-family:'Space Mono',monospace;font-size:22px;font-weight:700}.logo h1 span{color:var(--accent)}.subtitle{color:var(--text-dim);font-size:14px;margin-bottom:36px;line-height:1.5}.input-group{position:relative;margin-bottom:16px}.input-group input{width:100%;padding:16px 70px 16px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:15px;outline:none}.input-group input::placeholder{color:var(--text-dim);opacity:.6}.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.paste-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);padding:8px 10px;font-size:12px;cursor:pointer}.dl-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#cc2255);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow);position:relative;overflow:hidden}.dl-btn:disabled{opacity:.5;cursor:not-allowed}.dl-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 2.5s infinite}@keyframes shimmer{0%{left:-100%}100%{left:100%}}.status{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:14px;line-height:1.5;display:none}.status.loading{display:block;background:var(--surface);border:1px solid var(--border);color:var(--text-dim)}.status.success{display:block;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--success)}.status.error{display:block;background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.2);color:var(--accent2)}.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--text-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}.result-card{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}.result-card.show{display:block}.result-card video{width:100%;max-height:400px;object-fit:contain;background:#000}.result-actions{padding:16px}.save-btn{display:block;padding:14px;background:var(--success);border:none;border-radius:12px;color:#0a0a0f;font-family:inherit;font-size:15px;font-weight:700;text-decoration:none;text-align:center}.save-hint{color:var(--text-dim);font-size:12px;text-align:center;margin-top:10px}.instructions{margin-top:40px;padding-top:32px;border-top:1px solid var(--border)}.instructions h2{font-size:15px;font-weight:700;margin-bottom:16px}.step{display:flex;gap:12px;margin-bottom:16px}.step-num{flex-shrink:0;width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent)}.step p{font-size:14px;color:var(--text-dim);line-height:1.6;padding-top:3px}.footer{margin-top:48px;text-align:center;color:var(--text-dim);font-size:12px;opacity:.5}.quality-row{display:flex;gap:8px;margin-bottom:16px}.quality-chip{flex:1;padding:10px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;text-align:center;cursor:pointer}.quality-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,51,102,.08)}.fallback-btn{display:block;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:14px;font-weight:600;text-decoration:none;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="bg-glow"></div><div class="bg-glow two"></div>
<div class="container">
<div class="logo"><div class="logo-icon">▶</div><h1>Shorts<span>Saver</span></h1></div>
<p class="subtitle">YouTube ShortsのURLを貼り付けるだけ。<br>iPhoneのカメラロールに保存できます。</p>
<div class="input-group">
<input type="url" id="urlInput" placeholder="YouTubeショートのURLをペースト" autocomplete="off">
<button class="paste-btn" onclick="pasteURL()">📋 貼付</button>
</div>
<div class="quality-row">
<button class="quality-chip active" data-q="720" onclick="setQuality(this)">720p</button>
<button class="quality-chip" data-q="1080" onclick="setQuality(this)">1080p</button>
<button class="quality-chip" data-q="max" onclick="setQuality(this)">最高画質</button>
</div>
<button class="dl-btn" id="dlBtn" onclick="download()"><span class="shimmer"></span>ダウンロード開始</button>
<div class="status" id="status"></div>
<div class="result-card" id="resultCard">
<video id="previewVideo" controls playsinline></video>
<div class="result-actions">
<a class="save-btn" id="saveLink" href="#" download="shorts.mp4">📥 カメラロールに保存</a>
<p class="save-hint">ボタンを長押し →「リンク先のファイルをダウンロード」</p>
</div>
</div>
<div class="instructions">
<h2>💡 使い方</h2>
<div class="step"><div class="step-num">1</div><p>YouTubeアプリで「共有」→「リンクをコピー」</p></div>
<div class="step"><div class="step-num">2</div><p>「📋 貼付」をタップしてURLを入力</p></div>
<div class="step"><div class="step-num">3</div><p>「ダウンロード開始」をタップ</p></div>
<div class="step"><div class="step-num">4</div><p>「カメラロールに保存」を長押し→保存</p></div>
</div>
<div class="footer">Shorts Saver</div>
</div>
<script>
var selectedQuality='720';
var INSTANCES=['https://cobalt.saidev.dev','https://api.cobalt.best','https://cobalt-api.kwiatekmiki.com','https://cobalt.api.timelessnesses.me','https://co.eepy.today'];
function setQuality(el){document.querySelectorAll('.quality-chip').forEach(function(c){c.classList.remove('active')});el.classList.add('active');selectedQuality=el.dataset.q}
async function pasteURL(){try{var t=await navigator.clipboard.readText();document.getElementById('urlInput').value=t}catch(e){document.getElementById('urlInput').focus();showStatus('手動でペーストしてください','error')}}
function showStatus(msg,type){var el=document.getElementById('status');el.className='status '+type;el.innerHTML=msg}
function extractVideoId(url){var m;m=url.match(/shorts\/([a-zA-Z0-9_\-]{11})/);if(m)return m[1];m=url.match(/youtu\.be\/([a-zA-Z0-9_\-]{11})/);if(m)return m[1];m=url.match(/[?&]v=([a-zA-Z0-9_\-]{11})/);if(m)return m[1];return null}
async function fetchInstances(){try{var res=await fetch('https://instances.cobalt.best/api/instances.json');if(res.ok){var list=await res.json();var good=[];for(var i=0;i<list.length;i++){var inst=list[i];if(inst.online&&inst.info&&inst.info.cors===true&&inst.info.auth===false&&inst.services&&inst.services['youtube shorts']===true){good.push(inst.protocol+'://'+inst.api)}}if(good.length>0)return good}}catch(e){}return INSTANCES}
async function tryApi(base,videoUrl){var controller=new AbortController();var timeout=setTimeout(function(){controller.abort()},10000);try{var res=await fetch(base+'/',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({url:videoUrl,videoQuality:selectedQuality,youtubeVideoCodec:'h264',filenameStyle:'basic',downloadMode:'auto'}),signal:controller.signal});clearTimeout(timeout);if(!res.ok)throw new Error('HTTP '+res.status);return await res.json()}catch(e){clearTimeout(timeout);throw e}}
async function download(){var inp=document.getElementById('urlInput');var url=inp.value.trim();var btn=document.getElementById('dlBtn');var rc=document.getElementById('resultCard');rc.classList.remove('show');if(!url){showStatus('URLを入力してください','error');inp.focus();return}var vid=extractVideoId(url);if(!vid){showStatus('有効なYouTubeショートURLではありません','error');return}var nu='https://www.youtube.com/shorts/'+vid;btn.disabled=true;btn.textContent='処理中...';showStatus('<span class="spinner"></span> インスタンスを検索中...','loading');var instances=await fetchInstances();showStatus('<span class="spinner"></span> 動画を変換中...','loading');var ok=false;for(var i=0;i<instances.length;i++){try{var data=await tryApi(instances[i],nu);if(data.status==='error'){console.log('Instance error:',instances[i],data.error);continue}var dlUrl=data.url;if(dlUrl){showStatus('✅ 変換完了！下のボタンから保存してください','success');document.getElementById('previewVideo').src=dlUrl;document.getElementById('saveLink').href=dlUrl;rc.classList.add('show');setTimeout(function(){rc.scrollIntoView({behavior:'smooth',block:'center'})},200);ok=true;break}if(data.status==='picker'&&data.picker&&data.picker.length>0){var pUrl=data.picker[0].url;showStatus('✅ 変換完了！下のボタンから保存してください','success');document.getElementById('previewVideo').src=pUrl;document.getElementById('saveLink').href=pUrl;rc.classList.add('show');setTimeout(function(){rc.scrollIntoView({behavior:'smooth',block:'center'})},200);ok=true;break}}catch(e){console.log('Failed:',instances[i],e.message);continue}}if(!ok){showStatus('⚠️ 自動変換に失敗しました。<br>cobalt.toolsで直接ダウンロードしてください：<a class="fallback-btn" href="https://cobalt.tools/" target="_blank" rel="noopener">cobalt.tools を開く</a>','error')}btn.disabled=false;btn.innerHTML='<span class="shimmer"></span>ダウンロード開始'}
document.getElementById('urlInput').addEventListener('keydown',function(e){if(e.key==='Enter')download()});
</script>
</body>
</html>
