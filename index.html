<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shorts Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141420;--surface2:#1c1c2e;--accent:#ff3366;--accent2:#ff6b9d;--accent-glow:rgba(255,51,102,0.3);--text:#e8e8f0;--text-dim:#8888aa;--border:#2a2a40;--success:#00e676;--radius:16px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}.bg-glow{position:fixed;top:-30%;left:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(255,51,102,0.08) 0%,transparent 70%);pointer-events:none;animation:drift 12s ease-in-out infinite alternate}.bg-glow.two{top:auto;bottom:-30%;left:auto;right:-20%;background:radial-gradient(circle,rgba(100,50,255,0.06) 0%,transparent 70%);animation-delay:-6s}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:60px 20px 40px}.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#cc2255);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px var(--accent-glow)}.logo h1{font-family:'Space Mono',monospace;font-size:22px;font-weight:700}.logo h1 span{color:var(--accent)}.subtitle{color:var(--text-dim);font-size:14px;margin-bottom:36px;line-height:1.5}.input-group{position:relative;margin-bottom:16px}.input-group input{width:100%;padding:16px 70px 16px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:15px;outline:none}.input-group input::placeholder{color:var(--text-dim);opacity:.6}.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.paste-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);padding:8px 10px;font-size:12px;cursor:pointer}.dl-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#cc2255);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow);position:relative;overflow:hidden}.dl-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 2.5s infinite}@keyframes shimmer{0%{left:-100%}100%{left:100%}}.status{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:14px;line-height:1.5;display:none}.status.success{display:block;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--success)}.status.error{display:block;background:rgba(255,51,102,.08);border:1px solid rgba(255,51,102,.2);color:var(--accent2)}.instructions{margin-top:40px;padding-top:32px;border-top:1px solid var(--border)}.instructions h2{font-size:15px;font-weight:700;margin-bottom:16px}.step{display:flex;gap:12px;margin-bottom:16px}.step-num{flex-shrink:0;width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent)}.step p{font-size:14px;color:var(--text-dim);line-height:1.6;padding-top:3px}.footer{margin-top:48px;text-align:center;color:var(--text-dim);font-size:12px;opacity:.5}
</style>
</head>
<body>
<div class="bg-glow"></div><div class="bg-glow two"></div>
<div class="container">
<div class="logo"><div class="logo-icon">▶</div><h1>Shorts<span>Saver</span></h1></div>
<p class="subtitle">YouTube ShortsのURLを貼り付けてタップするだけ。<br>cobalt.toolsでダウンロードできます。</p>
<div class="input-group">
<input type="url" id="urlInput" placeholder="YouTubeショートのURLをペースト" autocomplete="off">
<button class="paste-btn" onclick="pasteURL()">📋 貼付</button>
</div>
<button class="dl-btn" id="dlBtn" onclick="download()"><span class="shimmer"></span>📥 URLをコピーしてcobaltを開く</button>
<div class="status" id="status"></div>
<div class="instructions">
<h2>💡 使い方</h2>
<div class="step"><div class="step-num">1</div><p>YouTubeアプリで「共有」→「リンクをコピー」</p></div>
<div class="step"><div class="step-num">2</div><p>このページで「📋 貼付」をタップ</p></div>
<div class="step"><div class="step-num">3</div><p>「📥 URLをコピーしてcobaltを開く」をタップ</p></div>
<div class="step"><div class="step-num">4</div><p>cobalt.toolsが開くので入力欄に貼り付け→ダウンロード</p></div>
</div>
<div class="footer">Shorts Saver</div>
</div>
<script>
async function pasteURL(){try{var t=await navigator.clipboard.readText();document.getElementById('urlInput').value=t}catch(e){document.getElementById('urlInput').focus()}}
function showStatus(msg,type){var el=document.getElementById('status');el.className='status '+type;el.innerHTML=msg}
function extractVideoId(url){var m;m=url.match(/shorts\/([a-zA-Z0-9_\-]{11})/);if(m)return m[1];m=url.match(/youtu\.be\/([a-zA-Z0-9_\-]{11})/);if(m)return m[1];m=url.match(/[?&]v=([a-zA-Z0-9_\-]{11})/);if(m)return m[1];return null}
async function download(){var inp=document.getElementById('urlInput');var url=inp.value.trim();if(!url){showStatus('URLを入力してください','error');inp.focus();return}var vid=extractVideoId(url);if(!vid){showStatus('有効なYouTubeショートURLではありません','error');return}var cleanUrl='https://www.youtube.com/shorts/'+vid;try{await navigator.clipboard.writeText(cleanUrl);showStatus('✅ URLをコピーしました！cobalt.toolsが開きます…','success');setTimeout(function(){window.open('https://cobalt.tools/','_blank')},600)}catch(e){showStatus('✅ cobalt.toolsを開きます。下のURLをコピーしてください：<br><input type="text" value="'+cleanUrl+'" readonly onclick="this.select()" style="width:100%;padding:8px;margin-top:8px;background:#1c1c2e;border:1px solid #2a2a40;border-radius:8px;color:#e8e8f0;font-size:13px">','success');setTimeout(function(){window.open('https://cobalt.tools/','_blank')},600)}}
document.getElementById('urlInput').addEventListener('keydown',function(e){if(e.key==='Enter')download()});
</script>
</body>
</html>
