<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shorts Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141420;--surface2:#1c1c2e;--accent:#ff3366;--accent2:#ff6b9d;--accent-glow:rgba(255,51,102,0.3);--text:#e8e8f0;--text-dim:#8888aa;--border:#2a2a40;--success:#00e676;--radius:16px}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}.bg-glow{position:fixed;top:-30%;left:-20%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(255,51,102,0.08) 0%,transparent 70%);pointer-events:none;animation:drift 12s ease-in-out infinite alternate}.bg-glow.two{top:auto;bottom:-30%;left:auto;right:-20%;background:radial-gradient(circle,rgba(100,50,255,0.06) 0%,transparent 70%);animation-delay:-6s}@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:60px 20px 40px}.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#cc2255);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px var(--accent-glow)}.logo h1{font-family:'Space Mono',monospace;font-size:22px;font-weight:700}.logo h1 span{color:var(--accent)}.subtitle{color:var(--text-dim);font-size:14px;margin-bottom:36px;line-height:1.5}.input-group{position:relative;margin-bottom:16px}.input-group input{width:100%;padding:16px 70px 16px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:15px;outline:none}.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.paste-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);padding:8px 10px;font-size:12px;cursor:pointer}.dl-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#cc2255);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px var(--accent-glow);position:relative;overflow:hidden}.dl-btn:disabled{opacity:0.5}.dl-btn .shimmer{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);animation:shimmer 2.5s infinite}@keyframes shimmer{0%{left:-100%}100%{left:100%}}.status{margin-top:16px;padding:14px 16px;border-radius:12px;font-size:14px;line-height:1.5;display:none}.status.loading{display:block;background:var(--surface);border:1px solid var(--border);color:var(--text-dim)}.status.success{display:block;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);color:var(--success)}.status.error{display:block;background:rgba(255,51,102,0.08);border:1px solid rgba(255,51,102,0.2);color:var(--accent2)}.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--text-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}.result-card{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:none}.result-card.show{display:block}.result-card video{width:100%;max-height:400px;object-fit:contain;background:#000}.result-actions{padding:16px}.save-btn{display:block;padding:14px;background:var(--success);border:none;border-radius:12px;color:#0a0a0f;font-family:inherit;font-size:15px;font-weight:700;text-decoration:none;text-align:center}.instructions{margin-top:40px;padding-top:32px;border-top:1px solid var(--border)}.instructions h2{font-size:15px;font-weight:700;margin-bottom:16px}.step{display:flex;gap:12px;margin-bottom:16px}.step-num{flex-shrink:0;width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent)}.step p{font-size:14px;color:var(--text-dim);line-height:1.6;padding-top:3px}.footer{margin-top:48px;text-align:center;color:var(--text-dim);font-size:12px;opacity:0.5}.quality-row{display:flex;gap:8px;margin-bottom:16px}.quality-chip{flex:1;padding:10px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;text-align:center;cursor:pointer}.quality-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,51,102,0.08)}
</style>
</head>
<body>
<div class="bg-glow"></div><div class="bg-glow two"></div>
<div class="container">
<div class="logo"><div class="logo-icon">▶</div><h1>Shorts<span>Saver</span></h1></div>
<p class="subtitle">YouTube ShortsのURLを貼り付けるだけ。<br>iPhoneのカメラロールに保存できます。</p>
<div class="input-group">
<input type="url" id="urlInput" placeholder="YouTubeショートのURLをペースト">
<button class="paste-btn" onclick="pasteURL()">📋 貼付</button>
</div>
<div class="quality-row">
<button class="quality-chip active" data-q="720" onclick="setQuality(this)">720p</button>
<button class="quality-chip" data-q="1080" onclick="setQuality(this)">1080p</button>
<button class="quality-chip" data-q="best" onclick="setQuality(this)">最高画質</button>
</div>
<button class="dl-btn" id="dlBtn" onclick="download()"><span class="shimmer"></span>ダウンロード開始</button>
<div class="status" id="status"></div>
<div class="result-card" id="resultCard">
<video id="previewVideo" controls playsinline></video>
<div class="result-actions"><a class="save-btn" id="saveLink" href="#" download="shorts.mp4">📥 カメラロールに保存</a></div>
</div>
<div class="instructions">
<h2>💡 使い方</h2>
<div class="step"><div class="step-num">1</div><p>YouTubeアプリで「共有」→「リンクをコピー」</p></div>
<div class="step"><div class="step-num">2</div><p>「📋 貼付」をタップしてURLを入力</p></div>
<div class="step"><div class="step-num">3</div><p>「ダウンロード開始」をタップ</p></div>
<div class="step"><div class="step-num">4</div><p>「カメラロールに保存」を長押し→保存</p></div>
</div>
<div class="footer">Shorts Saver</div>
</div>
<script>
let selectedQuality='720';const COBALT_APIS=['https://api.cobalt.tools','https://cobalt-api.kwiatekmiki.com','https://cobalt.api.timelessnesses.me'];function setQuality(el){document.querySelectorAll('.quality-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');selectedQuality=el.dataset.q}async function pasteURL(){try{const t=await navigator.clipboard.readText();document.getElementById('urlInput').value=t}catch{document.getElementById('urlInput').focus()}}function showStatus(msg,type){const el=document.getElementById('status');el.className='status '+type;el.innerHTML=msg}function extractVideoId(url){const p=[/shorts\\/([a-zA-Z0-9_-]{11})/,/youtu\\.be\\/([a-zA-Z0-9_-]{11})/,/[?&]v=([a-zA-Z0-9_-]{11})/];for(const r of p){const m=url.match(r);if(m)return m[1]}return null}async function tryApi(base,url){const qm={'720':'720','1080':'1080','best':'max'};const r=await fetch(base+'/api/json',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({url,vCodec:'h264',vQuality:qm[selectedQuality]||'720',filenamePattern:'basic',isAudioOnly:false})});if(!r.ok)throw new Error(r.status);return r.json()}async function download(){const inp=document.getElementById('urlInput');const url=inp.value.trim();const btn=document.getElementById('dlBtn');const rc=document.getElementById('resultCard');rc.classList.remove('show');if(!url){showStatus('URL\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044','error');return}const vid=extractVideoId(url);if(!vid){showStatus('\u6709\u52b9\u306aYouTube\u30b7\u30e7\u30fc\u30c8URL\u3067\u306f\u3042\u308a\u307e\u305b\u3093','error');return}const nu='https://www.youtube.com/shorts/'+vid;btn.disabled=true;btn.textContent='\u51e6\u7406\u4e2d...';showStatus('<span class="spinner"></span> \u52d5\u753b\u3092\u5909\u63db\u4e2d...','loading');let ok=false;for(const api of COBALT_APIS){try{const d=await tryApi(api,nu);if(d.url){showStatus('\u2705 \u5909\u63db\u5b8c\u4e86\uff01\u4e0b\u306e\u30dc\u30bf\u30f3\u304b\u3089\u4fdd\u5b58','success');document.getElementById('previewVideo').src=d.url;document.getElementById('saveLink').href=d.url;rc.classList.add('show');setTimeout(()=>rc.scrollIntoView({behavior:'smooth',block:'center'}),200);ok=true;break}}catch(e){continue}}if(!ok)showStatus('\u26a0\ufe0f \u5909\u63db\u5931\u6557\u3002URL\u3092\u78ba\u8a8d\u3057\u3066\u30ea\u30c8\u30e9\u30a4','error');btn.disabled=false;btn.innerHTML='<span class="shimmer"></span>\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u958b\u59cb'}document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')download()});
</script>
</body>
</html>
